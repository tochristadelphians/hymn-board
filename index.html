<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html,body{
height:100%;
width:100%;
margin:0;
padding:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
color:white;
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,0.45);
box-sizing:border-box;
padding:2vh 4vw;

display:flex;
flex-direction:column;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
font-size:6vh;
row-gap:1vh;
}

.right{
text-align:right;
}

.verse{
font-size:3vh;
line-height:1.35;
max-height:28vh;
}

.reference{
margin-top:1vh;
border-top:2px solid white;
padding-top:1vh;
font-size:2.6vh;
}

</style>

</head>

<body>

<div class="overlay">

<div class="grid">

<div id="label1"></div>
<div class="right" id="h1"></div>

<div id="label2"></div>
<div class="right" id="psalm"></div>

<div id="label3"></div>
<div class="right" id="reading"></div>

<div id="label4"></div>
<div class="right" id="h2"></div>

<div id="label5"></div>
<div class="right" id="h3"></div>

<div id="label6"></div>
<div class="right" id="h4"></div>
  
</div>

<div></div>

<div class="verse">
<div id="verse"></div>
<div class="reference" id="reference"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
