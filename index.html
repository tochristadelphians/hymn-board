<!DOCTYPE html>
<html>
<head>

}

.overlay{

}

.grid{
display:grid;

}

.right{

}

.verse{
position:absolute;
bottom:80px;
left:100px;
right:100px;
font-size:34px;
}

.reference{
margin-top:20px;
border-top:2px solid white;
padding-top:10px;
font-size:28px;
}

</style>

</head>

<body>

<div class="grid">

<div>Hymn</div>

<div>Hymn</div>

<div>Hymn</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
