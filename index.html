<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html,body{
height:100%;
width:100%;
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
color:white;
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,0.55);
box-sizing:border-box;
padding:2vh 4vw;

display:flex;
flex-direction:column;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
row-gap:1.5vh;
align-items:center;
}

/* left column (labels like Hymn, Micah, Hebrews) */
.grid div:nth-child(odd){
font-size:10vh;
opacity:0.9;
}

/* right column (numbers/readings) */
.grid div:nth-child(even){
font-size:10vh;
opacity:0.9;
/*font-weight:bold;*/
}

.right{
text-align:right;
}

.verse{
font-size:3vh;
line-height:1.35;
max-height:28vh;
}

.reference{
margin-top:1vh;
border-top:2px solid white;
padding-top:1vh;
font-size:2.6vh;
}
.clock{
position:absolute;
top:1vh;
left:50%;
transform:translateX(-50%);
font-size:5vh;
font-weight:bold;
letter-spacing:.1vh;
z-index:5;
}
#bgvideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}


</style>

</head>

<body>

<video autoplay muted loop playsinline preload="auto" id="bgvideo">
<source src="hymnBoardBackground.mp4" type="video/mp4">
</video>

<div class="clock" id="clock"></div>
<div class="overlay">

<div class="grid">

<div id="label1"></div>
<div class="right" id="h1"></div>

<div id="label2"></div>
<div class="right" id="psalm"></div>

<div id="label3"></div>
<div class="right" id="reading"></div>

<div id="label4"></div>
<div class="right" id="h2"></div>

<div id="label5"></div>
<div class="right" id="h3"></div>

<div id="label6"></div>
<div class="right" id="h4"></div>
  
</div>

<div></div>

<div class="verse">
<div id="verse"></div>
<div class="reference" id="reference"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
