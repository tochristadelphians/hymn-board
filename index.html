<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
height:100%;
width:100%;
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
color:white;
background-size:cover;
background-position:center;
}

.overlay{
height:100vh;
background:rgba(0,0,0,0.45);
padding:4vh 5vw;
box-sizing:border-box;

display:grid;
grid-template-rows:auto 1fr auto;
}

.grid{
display:grid;
grid-template-columns: 1fr 1fr;
font-size:5vh;
row-gap:1.5vh;
}

.right{
text-align:right;
}

.verse{
font-size:2.8vh;
line-height:1.3;
}

.reference{
margin-top:1vh;
border-top:2px solid white;
padding-top:1vh;
font-size:2.3vh;
}

</style>

</head>

<body>

<div class="overlay">

<div class="grid">

<div>Hymn</div>
<div class="right" id="h1"></div>

<div>Psalm</div>
<div class="right" id="psalm"></div>

<div>Hebrews</div>
<div class="right" id="reading"></div>

<div>Hymn</div>
<div class="right" id="h2"></div>

<div>Hymn</div>
<div class="right" id="h3"></div>

<div>Hymn</div>
<div class="right" id="h4"></div>

</div>

<div></div>

<div class="verse">
<div id="verse"></div>
<div class="reference" id="reference"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
