<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
background-size:cover;
background-position:center;
overflow:hidden;
}

.overlay{
background:rgba(0,0,0,0.45);
height:100vh;
padding:5vh 6vw;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns: 1fr 1fr;
font-size:6vh;
row-gap:2vh;
}

.right{
text-align:right;
}

.verse{
position:absolute;
bottom:4vh;
left:6vw;
right:6vw;
font-size:3vh;
line-height:1.3;
}

.reference{
margin-top:1vh;
border-top:2px solid white;
padding-top:1vh;
font-size:2.5vh;
}

</style>

</head>

<body>

<div class="overlay">

<div class="grid">

<div>Hymn</div>
<div class="right" id="h1"></div>

<div>Psalm</div>
<div class="right" id="psalm"></div>

<div>Hebrews</div>
<div class="right" id="reading"></div>

<div>Hymn</div>
<div class="right" id="h2"></div>

<div>Hymn</div>
<div class="right" id="h3"></div>

<div>Hymn</div>
<div class="right" id="h4"></div>

</div>

<div class="verse">

<div id="verse"></div>

<div class="reference" id="reference"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
